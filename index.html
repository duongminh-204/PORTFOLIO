<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duong Quang Minh | .NET Backend Developer</title>
     
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <!-- Typed.js -->
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <!-- pdf.js UMD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Point PDF.js to the worker script (do NOT load the worker script as a normal <script> tag).
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        } else {
            // store fallback for later scripts
            window.__pdfWorkerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<!-- === CUSTOM CSS === -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/album.css">
<link rel="stylesheet" href="css/projects.css">
<link rel="stylesheet" href="css/skills.css">
<link rel="stylesheet" href="css/certificates.css">
<link rel="stylesheet" href="css/modals.css">
<link rel="stylesheet" href="css/utilities.css">
<link rel="stylesheet" href="css/responsive.css">
    <!-- PhotoSwipe -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/photoswipe.min.css" />
    
    <link rel="icon" href="assets/images/favicon.ico">
</head>
<body>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    
    <div id="navbar-placeholder"></div>
    <div id="hero-placeholder"></div>
    <div id="about-placeholder"></div>
    <div id="album-placeholder"></div>
    <div id="experience-placeholder"></div>
    <div id="projects-placeholder"></div>
    <div id="skills-placeholder"></div>
    <div id="certificates-placeholder"></div>
    <div id="contact-placeholder"></div>

    <!-- Modal Profile Zoom -->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen modal-dialog-centered">
            <div class="modal-content bg-dark bg-opacity-90 border-0">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close btn-close-white fs-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center p-0">
                    <img src="assets/images/profile.jpg" alt="Duong Quang Minh - Full View" class="modal-profile-img img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal xem CV -->
    <div class="modal fade" id="cvModal" tabindex="-1" aria-labelledby="cvModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-dark border-0">
                <div class="modal-header border-0 d-flex justify-content-between align-items-center">
                    <h5 class="modal-title text-white ms-3" id="cvModalLabel">Duong Quang Minh - CV</h5>
                    <button type="button" class="btn-close btn-close-white me-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 position-relative" style="height: calc(100vh - 70px);">
                    <iframe id="pdfViewerIframe" src="" width="100%" height="100%" style="border: none;" allowfullscreen></iframe>
                    <div id="pdfLoading" class="position-absolute top-50 start-50 translate-middle text-white fs-4">
                        Đang tải CV... <div class="spinner-border text-primary mt-2" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="auto" muted>
        <source src="assets/audio/comearoundme.mp3" type="audio/mpeg">
    </audio>
    <button id="musicToggle" class="music-toggle" aria-label="Toggle background music">
        <i class="bi bi-volume-mute-fill"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/umd/photoswipe.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/umd/photoswipe-lightbox.umd.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
