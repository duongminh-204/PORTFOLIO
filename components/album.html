<section id="album" class="section py-5 bg-dark-secondary album-section">
    <div class="container album-container">
        <h2 class="section-title text-center mb-5" data-aos="fade-up">Album Image</h2>
        
        <!-- Description with Fullscreen Button -->
        <div class="album-description-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px;">
            <p class="text-center text-muted mb-0" data-aos="fade-up" data-aos-delay="100" style="flex: 1;">
                A collection of memorable moments captured in photos, showcasing life's beauty and diversity.
            </p>
            <button id="albumFullscreenToggle" class="album-fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen" style="position: static; margin: 0; flex-shrink: 0;">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
        </div>

        <div class="swiper albumSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="assets/images/Coffee.jpg" data-pswp-src="assets/images/Coffee.jpg"
                        data-pswp-width="1920" data-pswp-height="1280" alt="Khoảnh khắc 1" class="album-img">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/Debate.jpg" data-pswp-src="assets/images/Debate.jpg"
                        data-pswp-width="1920" data-pswp-height="1280" alt="Khoảnh khắc 2" class="album-img">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/Fpt.jpg" data-pswp-src="assets/images/Fpt.jpg" data-pswp-width="1920"
                        data-pswp-height="1280" alt="Khoảnh khắc 3" class="album-img">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/Sanco.jpg" data-pswp-src="assets/images/Sanco.jpg"
                        data-pswp-width="1920" data-pswp-height="1280" alt="Khoảnh khắc 4" class="album-img">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/Sea.JPG" data-pswp-src="assets/images/Sea.JPG" data-pswp-width="1920"
                        data-pswp-height="1280" alt="Khoảnh khắc 5" class="album-img">
                </div>
                <div class="swiper-slide">
                    <img src="assets/images/Earth.jpg" data-pswp-src="assets/images/Earth.jpg"
                        data-pswp-width="1920" data-pswp-height="1280" alt="Khoảnh khắc 6" class="album-img">
                </div>
            </div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>
</section>
